# ── Server ─────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ──────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/miniamazon?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root234102
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────────
# Replace with a 256-bit (32+ char) random secret in production
jwt.secret=miniAmazonSuperSecretKeyForJWT2024MinAmazon256Bit
jwt.expiration=86400000

# ── Logging ─────────────────────────────────────────────────
logging.level.com.miniamazon=DEBUG
logging.level.org.springframework.security=INFO